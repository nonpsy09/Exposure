<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            text-align: center; 
            background: transparent; 
            margin: 0; 
            padding: 0; 
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        
        .workspace-container {
            position: relative;
            width: 100%;
            max-width: 1050px;
            height: 500px;
            margin: 0 auto;
        }

        /* ตารางบันทึกผล */
        .table-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 480px;
            position: absolute;
            top: 50%;
            left: 5px; 
            transform: translateY(-50%);
        }
        
        .title { font-family: 'Itim', cursive; font-size: 22px; font-weight: bold; color: #333; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: white; }
        th, td { border: 2px solid #4a4a4a; padding: 10px 5px; font-size: 16px; text-align: center; }
        th { background-color: #f2f2f2; color: #333; }
        .header-set { color: #d32f2f; font-weight: bold; }
        .header-measured { color: #2f80ed; font-weight: bold; }
        .val-display { font-family: 'Itim', cursive; font-size: 24px; color: #1b66c9; }
        .set-display { font-family: 'Itim', cursive; font-size: 24px; color: #d32f2f; }
        .waiting { color: #aaa !important; }

        button.next-btn { 
            font-family: 'Prompt', sans-serif; padding: 10px 25px; border: none; border-radius: 6px; 
            font-size: 16px; font-weight: bold; cursor: pointer; background: #2f80ed; color: white; 
        }

        /* เครื่องคอนโซลควบคุม */
        .console-wrapper {
            position: absolute;
            top: 50%;
            right: 5px;
            transform: translateY(-50%);
            width: 900px;  
            height: auto;
        }

        .console-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 🛠️ ส่วนสร้างปุ่ม Shoot ดิจิทัลด้วยโค้ด CSS (สีเหลืองส้มสไตล์ปุ่มเครื่องเอกซเรย์จริง) */
        .css-shoot-btn {
            position: absolute;
            
            /* ⚠️ ปรับเล็งตำแหน่งปุ่มให้ไปทับปุ่มบนตัวเครื่องคอนโซลตรงนี้ครับ */
            top: 45%;       /* ปรับเปอร์เซ็นต์ขึ้น-ลง */
            right: 60px;    /* ปรับระยะขยับ ซ้าย-ขวา */
            
            width: 45px;    /* ขนาดความกว้างปุ่ม */
            height: 45px;   /* ขนาดความสูงปุ่ม (เท่ากันเพื่อให้เป็นวงกลมเป๊ะ) */
            
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9f43, #ee5253); /* สีส้มอมแดงแบบสวิตช์รังสี */
            border: 3px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.1s ease;
            z-index: 9999;
        }
        
        /* เอฟเฟกต์ตอนเอาเมาส์ไปชี้ปุ่ม */
        .css-shoot-btn:hover {
            filter: brightness(1.15);
            box-shadow: 0 5px 8px rgba(0,0,0,0.4), 0 0 10px rgba(255, 159, 67, 0.5);
        }
        
        /* เอฟเฟกต์เวลากดคลิกปุ่ม ให้ปุ่มยุบลงไปจริง */
        .css-shoot-btn:active {
            transform: scale(0.92);
            box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* 🎬 แอนิเมชันปุ่มกระพริบไฟสีแดงเตือนตอนเครื่องทำงาน (X-Ray ON) */
        .button-exposing {
            animation: radiation-glow 0.4s infinite alternate;
            cursor: default;
            pointer-events: none;
        }

        @keyframes radiation-glow {
            from {
                background: #ee5253;
                filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.8));
            }
            to {
                background: #ff3838;
                filter: drop-shadow(0 0 20px #ff3b30) brightness(1.4);
            }
        }
    </style>
</head>
<body>

    <div class="workspace-container">
        
        <div class="table-box">
            <div class="title">ตารางบันทึกผลการทดสอบ</div>
            <table>
                <tr>
                    <th rowspan="2" class="header-set" style="width: 30%;">Exposure time ที่ตั้ง<br>(msec)</th>
                    <th colspan="3" class="header-measured">Exposure time ที่วัดได้ (msec)</th>
                </tr>
                <tr>
                    <th style="font-size: 14px; background: #fafafa;">ครั้งที่ 1</th>
                    <th style="font-size: 14px; background: #fafafa;">ครั้งที่ 2</th>
                    <th style="font-size: 14px; background: #fafafa;">ครั้งที่ 3</th>
                </tr>
                <tr>
                    <td class="set-display"><span id="setTime">20</span></td>
                    <td class="val-display"><span id="shot1" class="waiting">-</span></td>
                    <td class="val-display"><span id="shot2" class="waiting">-</span></td>
                    <td class="val-display"><span id="shot3" class="waiting">-</span></td>
                </tr>
            </table>
            
            <button class="next-btn" id="nextBtn" onclick="goToNextStage()" style="display: none;">ไปหน้าถัดไป ➡️</button>
        </div>

        <div class="console-wrapper">
            <img id="consoleMain" class="console-img" src="" alt="X-Ray Console">
            
            <div id="shootTrigger" class="css-shoot-btn" onclick="startExposure()"></div>
        </div>

    </div>

    <script>
        var finalS1 = "-", finalS2 = "-", finalS3 = "-", isRevealed = false;
        var currentPath = "";

        window.onload = function() {
            currentPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
            
            // เรียกเฉพาะภาพตัวเครื่องหลักที่มีอยู่แล้วบน GitHub ครับ
            document.getElementById('consoleMain').src = currentPath + "console_bg.png";

            const urlParams = new URLSearchParams(window.location.search);
            const stage = urlParams.get('stage');
            var setVal = 20; 
            if (stage) {
                setVal = parseInt(stage);
                document.getElementById('setTime').innerText = setVal;
            }
            finalS1 = getRandomMeasured(setVal);
            finalS2 = getRandomMeasured(setVal);
            finalS3 = getRandomMeasured(setVal);
        };

        function getRandomMeasured(baseVal) {
            var randomPercent = (Math.random() * 5) - 2.5; 
            var finalVal = baseVal + (baseVal * (randomPercent / 100));
            return finalVal.toFixed(2);
        }

        function startExposure() {
            if (isRevealed) return;
            isRevealed = true; 

            // สลับเป็นภาพ GIF คอนโซลเคลื่อนไหว
            document.getElementById('consoleMain').src = currentPath + 'console_ani.gif';
            
            // เปิดเอฟเฟกต์ไฟกระพริบเตือนรังสีสีแดงที่ตัวปุ่ม CSS ทันที
            document.getElementById('shootTrigger').classList.add('button-exposing');

            // หน่วงเวลา 1.5 วินาทีรอแอนิเมชันวิ่งเสร็จ
            setTimeout(revealValues, 1500);
        }

        function revealValues() {
            var s1El = document.getElementById('shot1');
            var s2El = document.getElementById('shot2');
            var s3El = document.getElementById('shot3');

            s1El.innerText = finalS1; s2El.innerText = finalS2; s3El.innerText = finalS3;
            s1El.classList.remove('waiting'); s2El.classList.remove('waiting'); s3El.classList.remove('waiting');

            document.getElementById('nextBtn').style.display = 'inline-block';
            
            // เมื่อยิงเสร็จ ให้ดับไฟกระพริบ และเปลี่ยนปุ่มเป็นสีเทาเพื่อแสดงว่าใช้ไปแล้ว
            document.getElementById('shootTrigger').classList.remove('button-exposing');
            document.getElementById('shootTrigger').style.background = '#bdc3c7';
            document.getElementById('shootTrigger').style.border = '3px solid #7f8c8d';
            document.getElementById('shootTrigger').style.boxShadow = 'none';
        }

        function goToNextStage() {
            window.parent.postMessage('next', '*');
        }
    </script>
</body>
</html>
