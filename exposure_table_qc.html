<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            text-align: center; 
            background: transparent; 
            margin: 0; 
            padding: 0; 
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        
        .workspace-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 500px;
            margin: 0 auto;
        }

        /* ตารางบันทึกผล */
        .table-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 480px;
            position: absolute;
            top: 50%;
            left: 20px; 
            transform: translateY(-50%);
        }
        
        .title { font-family: 'Itim', cursive; font-size: 22px; font-weight: bold; color: #333; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: white; }
        th, td { border: 2px solid #4a4a4a; padding: 10px 5px; font-size: 16px; text-align: center; }
        th { background-color: #f2f2f2; color: #333; }
        .header-set { color: #d32f2f; font-weight: bold; }
        .header-measured { color: #2f80ed; font-weight: bold; }
        .val-display { font-family: 'Itim', cursive; font-size: 24px; color: #1b66c9; }
        .set-display { font-family: 'Itim', cursive; font-size: 24px; color: #d32f2f; }
        .waiting { color: #aaa !important; }

        button.next-btn { 
            font-family: 'Prompt', sans-serif; padding: 10px 25px; border: none; border-radius: 6px; 
            font-size: 16px; font-weight: bold; cursor: pointer; background: #2f80ed; color: white; 
        }

        /* เครื่องคอนโซลควบคุม */
        .console-wrapper {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 1000px;  
            height: auto;
        }

        .console-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ปุ่ม Shoot */
        .shoot-image-btn {
            position: absolute;
            top: 25%;       /* ปรับระดับความสูงต่ำบนเครื่องคอนโซล */
            right: 15px;    /* ปรับระยะขยับซ้ายขวา */
            width: 55px;    
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            z-index: 9999;
        }
        
        .shoot-image-btn:hover { filter: brightness(1.2); transform: scale(1.05); }
        .shoot-image-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="workspace-container">
        
        <div class="table-box">
            <div class="title">ตารางบันทึกผลการทดสอบ</div>
            <table>
                <tr>
                    <th rowspan="2" class="header-set" style="width: 30%;">Exposure time ที่ตั้ง<br>(msec)</th>
                    <th colspan="3" class="header-measured">Exposure time ที่วัดได้ (msec)</th>
                </tr>
                <tr>
                    <th style="font-size: 14px; background: #fafafa;">ครั้งที่ 1</th>
                    <th style="font-size: 14px; background: #fafafa;">ครั้งที่ 2</th>
                    <th style="font-size: 14px; background: #fafafa;">ครั้งที่ 3</th>
                </tr>
                <tr>
                    <td class="set-display"><span id="setTime">20</span></td>
                    <td class="val-display"><span id="shot1" class="waiting">-</span></td>
                    <td class="val-display"><span id="shot2" class="waiting">-</span></td>
                    <td class="val-display"><span id="shot3" class="waiting">-</span></td>
                </tr>
            </table>
            
            <button class="next-btn" id="nextBtn" onclick="goToNextStage()" style="display: none;">ไปหน้าถัดไป ➡️</button>
        </div>

        <div class="console-wrapper">
            <img id="consoleMain" class="console-img" src="console_bg.png" alt="X-Ray Console">
            
            <img id="shootTrigger" class="shoot-image-btn" src="shoot_button.png" alt="Shoot Button" onclick="startExposure()">
        </div>

    </div>

    <script>
        var finalS1 = "-", finalS2 = "-", finalS3 = "-", isRevealed = false;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const stage = urlParams.get('stage');
            var setVal = 20; 
            if (stage) {
                setVal = parseInt(stage);
                document.getElementById('setTime').innerText = setVal;
            }
            finalS1 = getRandomMeasured(setVal);
            finalS2 = getRandomMeasured(setVal);
            finalS3 = getRandomMeasured(setVal);
        };

        function getRandomMeasured(baseVal) {
            var randomPercent = (Math.random() * 5) - 2.5; 
            var finalVal = baseVal + (baseVal * (randomPercent / 100));
            return finalVal.toFixed(2);
        }

        // 1. ฟังก์ชันเมื่อกด Shoot: เริ่มเล่น GIF และปิดการกดซ้ำ
        function startExposure() {
            if (isRevealed) return;
            isRevealed = true; // ล็อกไม่ให้กดซ้ำ

            // สลับรูปคอนโซลนิ่ง -> เปลี่ยนเป็นภาพ GIF เคลื่อนไหว (console_ani.gif)
            document.getElementById('consoleMain').src = 'console_ani.gif';
            
            // ซ่อนหรือจางปุ่ม Shoot ลงขณะเครื่องทำงาน
            document.getElementById('shootTrigger').style.opacity = '0.3';
            document.getElementById('shootTrigger').style.cursor = 'default';

            // ⏱️ หน่วงเวลาให้ GIF เล่นก่อน (ตั้งไว้ที่ 1500 มิลลิวินาที หรือ 1.5 วินาที)
            // คุณสามารถเปลี่ยนเลข 1500 เป็นตัวเลขอื่นได้ตามความยาวของไฟล์ GIF ของคุณครับ
            setTimeout(revealValues, 1500);
        }

        // 2. ฟังก์ชันแสดงค่าในตาราง (จะทำงานหลังจาก GIF เล่นตามเวลาที่กำหนดเสร็จแล้ว)
        function revealValues() {
            var s1El = document.getElementById('shot1');
            var s2El = document.getElementById('shot2');
            var s3El = document.getElementById('shot3');

            s1El.innerText = finalS1; s2El.innerText = finalS2; s3El.innerText = finalS3;
            s1El.classList.remove('waiting'); s2El.classList.remove('waiting'); s3El.classList.remove('waiting');

            // แสดงปุ่มไปหน้าถัดไป
            document.getElementById('nextBtn').style.display = 'inline-block';
            
            // (เลือกเปิดไว้) เมื่อยิงรังสีเสร็จ สามารถปล่อยให้ค้างที่รูป GIF หรือจะสั่งให้สลับกลับมาเป็นรูปนิ่ง console_bg.png ก็ได้ครับ
            // ถ้าอยากให้กลับมาเป็นรูปนิ่ง ให้เอาเครื่องหมาย // บรรทัดข้างล่างนี้ออกครับ
            // document.getElementById('consoleMain').src = 'console_bg.png';
        }

        function goToNextStage() {
            window.parent.postMessage('next', '*');
        }
    </script>
</body>
</html>
